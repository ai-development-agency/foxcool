      var OLD = { "tel:+4733378901": 1, "mailto:someone@example.com": 1 };
      function fix(root){
        var links = (root || document).querySelectorAll('a[href]');
        for (var i = 0; i < links.length; i++) {
          if (OLD[links[i].getAttribute('href')]) {
            links[i].setAttribute('href', NEW_TEL);
          }
        }
      }
      fix();
      new MutationObserver(function(muts){
        for (var i = 0; i < muts.length; i++) {
          var added = muts[i].addedNodes;
          for (var j = 0; j < added.length; j++) {
            if (added[j].nodeType === 1) fix(added[j]);
          }
          if (muts[i].type === 'attributes' && muts[i].target.tagName === 'A') {
            if (OLD[muts[i].target.getAttribute('href')]) {
              muts[i].target.setAttribute('href', NEW_TEL);
            }
          }
        }
      }).observe(document.documentElement, { childList: true, subtree: true, attributes: true, attributeFilter: ['href'] });
    })();
    </script>
